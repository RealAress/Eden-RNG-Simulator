<!DOCTYPE html>
<html>

<head>

<title>Eden RNG Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Sarpanch:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

* {
    box-sizing: border-box;
}

body {
    margin:0;
    min-height:100vh;
    font-family:"Sarpanch", sans-serif;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;

    background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url("background1.png");

    background-size:cover;
    background-position:center;

    overflow:hidden;
}

/* PANELS */
.panel {
    position:relative;
    background:rgba(10,15,25,0.85);
    border:1px solid rgba(255,255,255,0.6);
    box-shadow:0 0 25px rgba(0,0,0,0.8);
    padding:30px;
}

/* ✅ INNER CORNERS SYSTEM (FIXED) */
.corner {
    position:absolute;
    width:18px;
    height:18px;
    pointer-events:none;
}

/* top */
.corner.tl {
    top:10px;
    left:10px;
    border-top:2px solid white;
    border-left:2px solid white;
}

.corner.tr {
    top:10px;
    right:10px;
    border-top:2px solid white;
    border-right:2px solid white;
}

/* bottom */
.corner.bl {
    bottom:10px;
    left:10px;
    border-bottom:2px solid white;
    border-left:2px solid white;
}

.corner.br {
    bottom:10px;
    right:10px;
    border-bottom:2px solid white;
    border-right:2px solid white;
}

/* GAME PANEL */
#game {
    width:430px;
    text-align:center;
}

h1 {
    font-size:45px;
    font-weight:900;
    letter-spacing:8px;
    text-shadow:0 0 15px white;
}

.subtitle {
    font-size:18px;
    letter-spacing:3px;
}

.label {
    margin-top:25px;
    opacity:0.7;
    letter-spacing:4px;
}

#timer {
    font-size:75px;
    font-weight:900;
    margin:35px 0;
    text-shadow:0 0 20px white;
}

#result {
    font-size:35px;
    font-weight:800;
    margin:20px;
}

/* SPEED BUTTONS */
.speed-buttons {
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

.speed-btn {
    width:78px;
    height:50px;

    position:relative;

    font-family:"Sarpanch";
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    background:rgba(10,15,25,0.85);
    border:1px solid rgba(255,255,255,0.6);
    cursor:pointer;
}

.speed-btn:hover,
.speed-btn.active {
    background:white;
    color:black;
}

/* SPEED BUTTON CORNERS (INNER STYLE) */
.btn-corner {
    position:absolute;
    width:10px;
    height:10px;
    pointer-events:none;
}

.btn-corner.tl { top:6px; left:6px; border-top:2px solid white; border-left:2px solid white; }
.btn-corner.tr { top:6px; right:6px; border-top:2px solid white; border-right:2px solid white; }
.btn-corner.bl { bottom:6px; left:6px; border-bottom:2px solid white; border-left:2px solid white; }
.btn-corner.br { bottom:6px; right:6px; border-bottom:2px solid white; border-right:2px solid white; }

/* LOG PANEL */
#logPanel {
    width:450px;
    height:560px;
    overflow:hidden;
}

#log {
    height:450px;
    overflow-y:scroll;
    overflow-x:hidden;

    display:flex;
    flex-direction:column;
    gap:10px;

    padding-right:6px;
}

/* WHITE SCROLLBAR */
#log::-webkit-scrollbar {
    width:10px;
}

#log::-webkit-scrollbar-track {
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
}

#log::-webkit-scrollbar-thumb {
    background:white;
    border:2px solid rgba(0,0,0,0.6);
}

#log::-webkit-scrollbar-thumb:hover {
    background:#eaeaea;
}

#log {
    scrollbar-width:auto;
    scrollbar-color:white rgba(255,255,255,0.08);
}

/* LOG ROW */
.log-row {
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:12px 14px;

    background:rgba(10,15,25,0.75);
    border:1px solid rgba(255,255,255,0.08);

    font-size:14px;
}

.log-success { color:#66ff99; }
.log-fail { color:#ff4d4d; }

.log-right {
    opacity:0.7;
    font-size:12px;
}

/* LEFT UI WRAPPER */
.left-ui {
    display:flex;
    align-items:center;
    gap:20px;
}

/* DISCORD BUTTON */
.discord-btn {
    width:180px;
    height:70px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    text-decoration:none;
    color:white;

    background:rgba(10,15,25,0.85);
    border:1px solid rgba(255,255,255,0.6);

    font-family:"Sarpanch", sans-serif;
    font-weight:700;
    letter-spacing:1px;

    position:relative;
}

.discord-icon {
    width:26px;
    height:26px;
}

.discord-text {
    font-size:12px;
    text-align:center;
    line-height:1.1;
}

/* DISCORD CORNERS */
.discord-btn .btn-corner {
    position:absolute;
    width:10px;
    height:10px;
    pointer-events:none;
}

.discord-btn .btn-corner.tl { top:6px; left:6px; border-top:2px solid white; border-left:2px solid white; }
.discord-btn .btn-corner.tr { top:6px; right:6px; border-top:2px solid white; border-right:2px solid white; }
.discord-btn .btn-corner.bl { bottom:6px; left:6px; border-bottom:2px solid white; border-left:2px solid white; }
.discord-btn .btn-corner.br { bottom:6px; right:6px; border-bottom:2px solid white; border-right:2px solid white; }

.discord-btn:hover {
    background:white;
    color:black;
}

.discord-btn:hover .discord-icon {
    filter:invert(1);
}

/* LOGO */
.sols-logo {
    position:fixed;
    left:25px;
    bottom:20px;
    width:220px;
    opacity:0.85;
}

/* DISCLAIMER */
.disclaimer {
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    color:rgba(255,255,255,0.7);
}

</style>

</head>

<body>

<div class="left-ui">

<a href="https://discord.gg/ruinsvb" target="_blank" class="discord-btn">

    <img src="discordicon.png" class="discord-icon">

    <div class="discord-text">
        JOIN OUR SERVER!
    </div>

    <div class="btn-corner tl"></div>
    <div class="btn-corner tr"></div>
    <div class="btn-corner bl"></div>
    <div class="btn-corner br"></div>

</a>

<div class="panel" id="game">

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<h1>EDEN RNG SIMULATOR</h1>

<div class="subtitle">
1 / 50,000 CHANCE<br>
ROLL EVERY 2 MINUTES
</div>

<div class="label">NEXT ROLL</div>
<div id="timer">02:00</div>

<div class="speed-buttons">

<button class="speed-btn active" onclick="setSpeed(1,this)">
1X<br>SPEED
<div class="btn-corner tl"></div>
<div class="btn-corner tr"></div>
<div class="btn-corner bl"></div>
<div class="btn-corner br"></div>
</button>

<button class="speed-btn" onclick="setSpeed(2,this)">
2X<br>SPEED
<div class="btn-corner tl"></div>
<div class="btn-corner tr"></div>
<div class="btn-corner bl"></div>
<div class="btn-corner br"></div>
</button>

<button class="speed-btn" onclick="setSpeed(5,this)">
5X<br>SPEED
<div class="btn-corner tl"></div>
<div class="btn-corner tr"></div>
<div class="btn-corner bl"></div>
<div class="btn-corner br"></div>
</button>

<button class="speed-btn" onclick="setSpeed(10,this)">
10X<br>SPEED
<div class="btn-corner tl"></div>
<div class="btn-corner tr"></div>
<div class="btn-corner bl"></div>
<div class="btn-corner br"></div>
</button>

</div>

<div class="label">LAST RESULT</div>
<div id="result">WAITING...</div>

</div>

</div>

<div class="panel" id="logPanel">

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<h2>📜 RNG LOG</h2>
<div id="log"></div>

</div>

<img src="solsrnglogo.png" class="sols-logo">

<div class="disclaimer">
Fan-made simulator by <a href="https://discord.com/users/542875554429272094" target="_blank">@ruinoxa</a> • Not affiliated with Sol's RNG
</div>

<script>

let seconds = 120;
let speed = 1;
let attempts = 0;
let last = Date.now();

function setSpeed(v, btn) {
    speed = v;
    document.querySelectorAll(".speed-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function RNG() {

    attempts++;

    let roll = Math.floor(Math.random() * 50000) + 1;
    let now = new Date();
    let win = roll === 1;

    const result = document.getElementById("result");
    result.innerHTML = win ? "✨ EDEN SPAWNED ✨" : "❌ FAILED";
    result.style.color = win ? "#66ff99" : "#ff4d4d";

    let row = document.createElement("div");
    row.className = "log-row " + (win ? "log-success" : "log-fail");

    row.innerHTML = `
        <div>
            <b>${win ? "SPAWNED" : "FAILED"}</b>
            | #${attempts}
            | Roll: ${roll}
        </div>

        <div class="log-right">
            ${now.toLocaleTimeString()}
        </div>
    `;

    document.getElementById("log").prepend(row);
}

setInterval(() => {

    let now = Date.now();
    let delta = (now - last) / 1000;
    last = now;

    seconds -= delta * speed;

    if (seconds <= 0) {
        seconds = 120;
        RNG();
    }

    let m = Math.floor(seconds / 60);
    let s = Math.floor(seconds % 60);

    document.getElementById("timer").innerHTML =
        String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");

}, 100);

</script>

</body>
</html>
