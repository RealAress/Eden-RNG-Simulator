<!DOCTYPE html>
<html>

<head>

<title>Eden Spawnrate Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Sarpanch:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

* {
    box-sizing: border-box;
}

body {
    margin:0;
    min-height:100vh;
    font-family:"Sarpanch", sans-serif;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;

    background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url("background1.png");

    background-size:cover;
    background-position:center;

    overflow:hidden;
}

/* PANELS */
.panel {
    position:relative;
    background:rgba(10,15,25,0.85);
    border:1px solid rgba(255,255,255,0.6);
    box-shadow:0 0 25px rgba(0,0,0,0.8);
    padding:30px;
}

.panel::before,
.panel::after {
    content:"";
    position:absolute;
    width:32px;
    height:32px;
}

.panel::before {
    top:-2px;
    left:-2px;
    border-top:3px solid white;
    border-left:3px solid white;
}

.panel::after {
    top:-2px;
    right:-2px;
    border-top:3px solid white;
    border-right:3px solid white;
}

.corner {
    position:absolute;
    width:32px;
    height:32px;
}

.corner.left {
    left:-2px;
    bottom:-2px;
    border-left:3px solid white;
    border-bottom:3px solid white;
}

.corner.right {
    right:-2px;
    bottom:-2px;
    border-right:3px solid white;
    border-bottom:3px solid white;
}

/* GAME PANEL */
#game {
    width:430px;
    text-align:center;
}

h1 {
    font-size:45px;
    font-weight:900;
    letter-spacing:8px;
    text-shadow:0 0 15px white;
}

.subtitle {
    font-size:18px;
    letter-spacing:3px;
}

.label {
    margin-top:25px;
    opacity:0.7;
    letter-spacing:4px;
}

#timer {
    font-size:75px;
    font-weight:900;
    margin:35px 0;
    text-shadow:0 0 20px white;
}

#result {
    font-size:35px;
    font-weight:800;
    margin:20px;
}

/* SPEED BUTTONS */
.speed-buttons {
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

.speed-btn {
    width:78px;
    height:50px;

    position:relative;
    overflow:hidden;

    font-family:"Sarpanch";
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;
    line-height:1.2;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    background:rgba(10,15,25,0.85);
    border:1px solid rgba(255,255,255,0.6);
    cursor:pointer;
}

.speed-btn:hover,
.speed-btn.active {
    background:white;
    color:black;
}

/* BUTTON CORNERS */
.btn-corner {
    position:absolute;
    width:10px;
    height:10px;
}

/* top-left */
.btn-corner.tl {
    top:-2px;
    left:-2px;
    border-top:2px solid white;
    border-left:2px solid white;
}

/* top-right */
.btn-corner.tr {
    top:-2px;
    right:-2px;
    border-top:2px solid white;
    border-right:2px solid white;
}

/* bottom-left */
.btn-corner.bl {
    bottom:-2px;
    left:-2px;
    border-bottom:2px solid white;
    border-left:2px solid white;
}

/* bottom-right */
.btn-corner.br {
    bottom:-2px;
    right:-2px;
    border-bottom:2px solid white;
    border-right:2px solid white;
}

/* LOG PANEL */
#logPanel {
    width:450px;
    height:560px;
    overflow:hidden;
}

#log {
    height:450px;
    overflow-y:scroll;
    overflow-x:hidden;

    display:flex;
    flex-direction:column;
    gap:10px;

    padding-right:6px;

    scrollbar-gutter: stable;
}

#log::-webkit-scrollbar {
    width:6px;
}

#log::-webkit-scrollbar-track {
    background:rgba(255,255,255,0.05);
}

#log::-webkit-scrollbar-thumb {
    background:rgba(255,255,255,0.25);
    border-radius:10px;
}

#log::-webkit-scrollbar-thumb:hover {
    background:rgba(255,255,255,0.4);
}

#log {
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.25) rgba(255,255,255,0.05);
}

/* LOG ROW */
.log-row {
    width:100%;
    min-width:0;
    flex-shrink:0;

    position:relative;
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:12px 14px;

    background:rgba(10,15,25,0.75);
    border:1px solid rgba(255,255,255,0.08);

    font-size:14px;
    letter-spacing:1px;

    overflow:hidden;
}

/* LOG CORNERS */
.log-row::before {
    content:"";
    position:absolute;
    top:-1px;
    left:-1px;
    width:16px;
    height:16px;
    border-top:2px solid white;
    border-left:2px solid white;
}

.log-row::after {
    content:"";
    position:absolute;
    top:-1px;
    right:-1px;
    width:16px;
    height:16px;
    border-top:2px solid white;
    border-right:2px solid white;
}

.log-row .bl,
.log-row .br {
    position:absolute;
    width:16px;
    height:16px;
}

.log-row .bl {
    bottom:-1px;
    left:-1px;
    border-bottom:2px solid white;
    border-left:2px solid white;
}

.log-row .br {
    bottom:-1px;
    right:-1px;
    border-bottom:2px solid white;
    border-right:2px solid white;
}

.log-success { color:#66ff99; }
.log-fail { color:#ff4d4d; }

.log-right {
    opacity:0.7;
    font-size:12px;
}

/* HUD */
.sols-logo {
    position:fixed;
    left:25px;
    bottom:20px;
    width:220px;
    opacity:0.85;
    z-index:9999;
}

.disclaimer {
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    color:rgba(255,255,255,0.7);
    z-index:9999;
}

</style>

</head>

<body>

<div class="panel" id="game">
<div class="corner left"></div>
<div class="corner right"></div>

<h1>EDEN RNG SIMULATOR</h1>

<div class="subtitle">
1 / 50,000 CHANCE<br>
ROLL EVERY 2 MINUTES
</div>

<div class="label">NEXT ROLL</div>
<div id="timer">02:00</div>

<div class="speed-buttons">

<button class="speed-btn active" onclick="setSpeed(1,this)">
1X<br>SPEED
<div class="btn-corner tl"></div>
<div class="btn-corner tr"></div>
<div class="btn-corner bl"></div>
<div class="btn-corner br"></div>
</button>

<button class="speed-btn" onclick="setSpeed(2,this)">
2X<br>SPEED
<div class="btn-corner tl"></div>
<div class="btn-corner tr"></div>
<div class="btn-corner bl"></div>
<div class="btn-corner br"></div>
</button>

<button class="speed-btn" onclick="setSpeed(5,this)">
5X<br>SPEED
<div class="btn-corner tl"></div>
<div class="btn-corner tr"></div>
<div class="btn-corner bl"></div>
<div class="btn-corner br"></div>
</button>

<button class="speed-btn" onclick="setSpeed(10,this)">
10X<br>SPEED
<div class="btn-corner tl"></div>
<div class="btn-corner tr"></div>
<div class="btn-corner bl"></div>
<div class="btn-corner br"></div>
</button>

</div>

<div class="label">LAST RESULT</div>
<div id="result">WAITING...</div>

</div>

<div class="panel" id="logPanel">
<div class="corner left"></div>
<div class="corner right"></div>

<h2>📜 RNG LOG</h2>
<div id="log"></div>
</div>

<img src="solsrnglogo.png" class="sols-logo">

<div class="disclaimer">
Fan-made simulator by @ruinoxa • Not affiliated with Sol's RNG
</div>

<script>

let seconds = 120;
let speed = 1;
let attempts = 0;
let last = Date.now();

function setSpeed(v, btn) {
    speed = v;
    document.querySelectorAll(".speed-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function RNG() {

    attempts++;

    let roll = Math.floor(Math.random() * 50000) + 1;
    let now = new Date();
    let win = roll === 1;

    const result = document.getElementById("result");
    result.innerHTML = win ? "✨ EDEN SPAWNED ✨" : "❌ FAILED";
    result.style.color = win ? "#66ff99" : "#ff4d4d";

    let row = document.createElement("div");
    row.className = "log-row " + (win ? "log-success" : "log-fail");

    row.innerHTML = `
        <div class="bl"></div>
        <div class="br"></div>

        <div>
            <b>${win ? "SPAWNED" : "FAILED"}</b>
            | #${attempts}
            | Roll: ${roll}
        </div>

        <div class="log-right">
            ${now.toLocaleTimeString()}
        </div>
    `;

    document.getElementById("log").prepend(row);
}

setInterval(() => {

    let now = Date.now();
    let delta = (now - last) / 1000;
    last = now;

    seconds -= delta * speed;

    if (seconds <= 0) {
        seconds = 120;
        RNG();
    }

    let m = Math.floor(seconds / 60);
    let s = Math.floor(seconds % 60);

    document.getElementById("timer").innerHTML =
        String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");

}, 100);

</script>

</body>
</html>
